<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Workflow preview placeholder">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#grid)"/>
  <g stroke="#cbd5e1" stroke-width="2" fill="#ffffff">
    <rect x="80" y="150" width="120" height="60" rx="8"/>
    <rect x="260" y="80" width="120" height="60" rx="8"/>
    <rect x="260" y="220" width="120" height="60" rx="8"/>
    <rect x="440" y="150" width="120" height="60" rx="8"/>
  </g>
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M200 180 Q230 180 260 110"/>
    <path d="M200 180 Q230 180 260 250"/>
    <path d="M380 110 Q410 110 440 180"/>
    <path d="M380 250 Q410 250 440 180"/>
  </g>
  <g fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">
    <text x="140" y="184">Trigger</text>
    <text x="320" y="114">Process</text>
    <text x="320" y="254">Branch</text>
    <text x="500" y="184">Output</text>
  </g>
</svg>
